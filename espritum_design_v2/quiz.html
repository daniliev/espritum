<!DOCTYPE html>
<html lang="fr">
<head>
<script src="page-loader.js"></script>
<script src="lang.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Test — Découvre ton archétype corporel | Espritum</title>
<meta name="description" content="En 30 secondes, découvre ton archétype corporel, ton taux de masse grasse estimé et tes recommandations personnalisées. Test gratuit Espritum.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://espritum.com/quiz.html">
<meta property="og:title" content="Découvre ton archétype corporel en 30 secondes">
<meta property="og:description" content="Taille, poids, objectif : obtiens ton archétype, ta masse grasse estimée et tes recommandations personnalisées.">
<meta property="og:image" content="https://espritum.com/blog-mesurer-hero.jpg">
<meta property="og:url" content="https://espritum.com/quiz.html">
<link rel="icon" href="fav-icon-003.png">
<link rel="stylesheet" href="https://use.typekit.net/gld3dja.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Semi+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c82828; --bg: #080808; --bg2: #0d0d0d; --bg3: #111; --border: #1e1e1e; --muted: #888;
    --green: #3ea66a; --amber: #e8a000;
    --font-display: 'acumin-pro-extra-condensed', 'Bebas Neue', sans-serif;
    --font-body: 'acumin-pro-condensed', 'Barlow Semi Condensed', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: var(--bg); color: #e9e9e9; font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

  .topbar { padding: 16px 22px; display: flex; align-items: center; gap: 10px; justify-content: flex-start; position: relative; border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .brand img { width: 30px; height: 30px; object-fit: contain; }
  .brand span { font-family: var(--font-display); font-size: 20px; letter-spacing: 5px; text-transform: uppercase; color: #fff; }
  .back-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 24px; line-height: 1; display: none; padding: 0 2px 0 0; }
  .back-btn:hover { color: #fff; }

  .progress-wrap { height: 4px; background: var(--bg3); }
  .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--red), #ff5a5a); transition: width 0.4s ease; }

  .stage { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px 22px 50px; max-width: 560px; width: 100%; margin: 0 auto; }

  .step { width: 100%; animation: fade 0.35s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .q-count { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); font-weight: 700; text-align: center; margin-bottom: 12px; }
  .q-title { font-family: var(--font-display); font-size: clamp(30px, 7vw, 44px); letter-spacing: 1px; text-transform: uppercase; color: #fff; text-align: center; line-height: 1.05; margin-bottom: 30px; }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .opt { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.18s; color: #eee; font-size: 17px; text-align: left; font-family: inherit; }
  .opt:hover { border-color: rgba(200,40,40,0.55); background: rgba(200,40,40,0.06); transform: translateX(3px); }
  .opt-ico { width: 42px; height: 42px; border-radius: 50%; border: 1px solid rgba(200,40,40,0.4); background: rgba(200,40,40,0.12); color: var(--red); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.18s; }
  .opt-ico svg { width: 21px; height: 21px; }
  .opt:hover .opt-ico { background: rgba(200,40,40,0.2); border-color: var(--red); }
  .opt-label { flex: 1; }

  .num-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .num-input { width: 100%; max-width: 280px; text-align: center; font-family: var(--font-display); font-size: 56px; letter-spacing: 1px; color: #fff; background: transparent; border: none; border-bottom: 2px solid var(--border); outline: none; padding: 6px 0; transition: border-color 0.2s; -moz-appearance: textfield; appearance: textfield; }
  .num-input::-webkit-outer-spin-button, .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .num-input:focus { border-bottom-color: var(--red); }
  .num-input::placeholder { color: #333; }
  .num-unit { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .num-err { color: #ef5350; font-size: 13px; min-height: 18px; margin-top: 4px; }

  .btn { width: 100%; max-width: 320px; margin: 28px auto 0; display: block; padding: 16px; background: var(--red); border: none; border-radius: 8px; color: #fff; font-family: var(--font-body); font-size: 14px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; text-align: center; }
  .btn:hover { background: #d93030; }
  .btn:disabled { background: var(--muted2, #2e2e2e); cursor: not-allowed; opacity: 0.5; }

  /* LEAD (formulaire waitlist avant le test) */
  .lead-sub { font-size: 15px; color: var(--muted); text-align: center; margin-bottom: 24px; line-height: 1.55; }
  .lead-form { display: flex; flex-direction: column; gap: 12px; }
  .lead-row { display: flex; gap: 12px; }
  .lead-field { flex: 1; width: 100%; padding: 15px 16px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; color: #fff; font-family: inherit; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .lead-field:focus { border-color: rgba(200,40,40,0.6); }
  .lead-field::placeholder { color: #555; }
  .lead-field.error { border-color: #ef5350; }
  .lead-msg { font-size: 14px; text-align: center; min-height: 20px; line-height: 1.4; }
  .lead-msg.err { color: #ef5350; }
  .lead-msg.ok { color: #3ea66a; }
  .lead-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 14px; }

  /* LOADING */
  .loader { text-align: center; }
  .loader-ring { width: 70px; height: 70px; border: 4px solid var(--bg3); border-top-color: var(--red); border-radius: 50%; margin: 0 auto 26px; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader h2 { font-family: var(--font-display); font-size: 30px; letter-spacing: 1px; text-transform: uppercase; color: #fff; margin-bottom: 8px; }
  .loader p { font-size: 15px; color: var(--muted); }

  /* RESULT */
  .result { width: 100%; text-align: center; animation: fade 0.4s ease; }
  .res-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); font-weight: 700; margin-bottom: 8px; }
  .res-img { display: block; width: 230px; max-width: 64%; height: auto; margin: 6px auto 14px; filter: drop-shadow(0 16px 38px rgba(200,40,40,0.32)); animation: fade 0.5s ease; }
  .res-name { font-family: var(--font-display); font-size: clamp(40px, 10vw, 64px); letter-spacing: 1px; text-transform: uppercase; color: #fff; line-height: 1; margin-bottom: 16px; }
  .res-desc { font-size: 16px; color: #cfcfcf; line-height: 1.6; margin-bottom: 26px; }
  .res-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 26px; }
  .res-stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 10px; }
  .res-stat .v { font-family: var(--font-display); font-size: 28px; color: var(--red); line-height: 1; }
  .res-stat .l { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
  .res-reco { text-align: left; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 22px 22px 8px; margin-bottom: 24px; }
  .res-reco .rtitle { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; text-transform: uppercase; color: #fff; margin-bottom: 14px; }
  .reco-item { display: flex; align-items: flex-start; gap: 12px; padding-bottom: 16px; }
  .reco-ico { width: 26px; height: 26px; border-radius: 50%; background: rgba(200,40,40,0.12); border: 1px solid rgba(200,40,40,0.4); color: var(--red); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .reco-ico svg { width: 14px; height: 14px; }
  .reco-item span.t { font-size: 15px; color: #d4d4d4; line-height: 1.5; }
  .res-teaser { font-size: 15px; color: #fff; background: rgba(200,40,40,0.07); border: 1px solid rgba(200,40,40,0.25); border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; }
  .redirect-note { font-size: 12px; color: var(--muted); margin-top: 14px; }
  .redirect-note b { color: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="back-btn" onclick="goBack()">‹</button>
  <a class="brand" href="index.html"><img src="fav-icon-003.png" alt="Espritum"><span>Espritum</span></a>
  <div id="esp-lang" style="margin-left:auto;"></div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>

<main class="stage" id="stage"></main>

<script>
  // Icône "barres d'intensité" (1 à 4 barres pleines)
  function barsIcon(n) {
    const h = [7, 11, 15, 19];
    let out = '';
    for (let k = 0; k < 4; k++) {
      const op = k < n ? '1' : '0.22';
      out += '<rect x="' + (2.5 + k * 5.2) + '" y="' + (21 - h[k]) + '" width="3.2" height="' + h[k] + '" rx="1.2" fill="currentColor" stroke="none" opacity="' + op + '"/>';
    }
    return out;
  }

  const IC = {
    homme: '<circle cx="10" cy="14" r="5.5"/><line x1="14" y1="10" x2="20.5" y2="3.5"/><polyline points="15 3.5 20.5 3.5 20.5 9"/>',
    femme: '<circle cx="12" cy="8.5" r="5.5"/><line x1="12" y1="14" x2="12" y2="21.5"/><line x1="8.5" y1="18.5" x2="15.5" y2="18.5"/>',
    ventre: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.2"/>',
    partout: '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>',
    bas: '<circle cx="12" cy="12" r="9"/><line x1="12" y1="7.5" x2="12" y2="15"/><polyline points="8.5 11.5 12 15.5 15.5 11.5"/>',
    mince: '<circle cx="12" cy="12" r="9"/><line x1="8" y1="12" x2="16" y2="12"/>',
    down: '<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>',
    up: '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
    repeat: '<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
    heart: '<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1.1-1.1a5.5 5.5 0 0 0-7.8 7.8L12 21.2l8.8-8.8a5.5 5.5 0 0 0 0-7.8z"/>'
  };

  // ── Bilingue FR/EN ──
  function L(fr, en) { return (window.espLang || (window.espGetLang ? window.espGetLang() : 'fr')) === 'en' ? en : fr; }
  function T(o) { return (o && typeof o === 'object' && 'fr' in o) ? L(o.fr, o.en) : o; }

  const STEPS = [
    { key:'genre', q:{fr:'Tu es…',en:'You are…'}, type:'choice', options:[
      {v:'homme',l:{fr:'Un homme',en:'A man'},icon:IC.homme},{v:'femme',l:{fr:'Une femme',en:'A woman'},icon:IC.femme}] },
    { key:'age', q:{fr:'Quel âge as-tu ?',en:'How old are you?'}, type:'number', unit:{fr:'ans',en:'years'}, min:14, max:99, ph:'28' },
    { key:'taille', q:{fr:'Quelle est ta taille ?',en:'What\'s your height?'}, type:'number', unit:{fr:'cm',en:'cm'}, min:120, max:230, ph:'178' },
    { key:'poids', q:{fr:'Quel est ton poids ?',en:'What\'s your weight?'}, type:'number', unit:{fr:'kg',en:'kg'}, min:35, max:250, ph:'82' },
    { key:'stockage', q:{fr:'Où stockes-tu la graisse en premier ?',en:'Where do you store fat first?'}, type:'choice', options:[
      {v:'ventre',l:{fr:'Surtout le ventre',en:'Mostly the belly'},icon:IC.ventre},{v:'partout',l:{fr:'Un peu partout',en:'A bit everywhere'},icon:IC.partout},{v:'bas',l:{fr:'Hanches / cuisses',en:'Hips / thighs'},icon:IC.bas},{v:'mince',l:{fr:'Je suis plutôt mince',en:'I\'m rather lean'},icon:IC.mince}] },
    { key:'objectif', q:{fr:'Ton objectif principal ?',en:'Your main goal?'}, type:'choice', options:[
      {v:'perte',l:{fr:'Perdre du gras',en:'Lose fat'},icon:IC.down},{v:'muscle',l:{fr:'Prendre du muscle',en:'Build muscle'},icon:IC.up},{v:'recomp',l:{fr:'Recomposition (les deux)',en:'Recomposition (both)'},icon:IC.repeat},{v:'forme',l:{fr:'Rester en forme',en:'Stay fit'},icon:IC.heart}] },
    { key:'activite', q:{fr:'Ton niveau d’activité au quotidien ?',en:'Your daily activity level?'}, type:'choice', options:[
      {v:'sed',l:{fr:'Sédentaire (bureau)',en:'Sedentary (desk)'},icon:barsIcon(1)},{v:'leger',l:{fr:'Léger',en:'Light'},icon:barsIcon(2)},{v:'modere',l:{fr:'Modéré',en:'Moderate'},icon:barsIcon(3)},{v:'intense',l:{fr:'Intense (physique)',en:'Intense (physical)'},icon:barsIcon(4)}] },
    { key:'seances', q:{fr:'Combien de séances de sport par semaine ?',en:'How many workouts per week?'}, type:'choice', options:[
      {v:'0',l:{fr:'0 à 1',en:'0 to 1'},icon:barsIcon(1)},{v:'2',l:{fr:'2 à 3',en:'2 to 3'},icon:barsIcon(2)},{v:'4',l:{fr:'4 à 5',en:'4 to 5'},icon:barsIcon(3)},{v:'6',l:{fr:'6 et plus',en:'6 and more'},icon:barsIcon(4)}] },
  ];

  const ARCH = {
    ecto: { name:{fr:'Ectomorphe',en:'Ectomorph'}, desc:{fr:"Ossature fine, métabolisme rapide : tu brûles vite les calories et tu as du mal à prendre. Ton levier, c'est construire du muscle avec des charges et assez de calories.",en:"Fine bone structure, fast metabolism: you burn calories quickly and struggle to gain. Your lever is building muscle with heavy loads and enough calories."} },
    meso: { name:{fr:'Mésomorphe',en:'Mesomorph'}, desc:{fr:"Ton corps répond vite à l'entraînement : tu prends du muscle et tu perds du gras facilement quand tu es discipliné. La recomposition est ton terrain de jeu.",en:"Your body responds fast to training: you build muscle and lose fat easily when you're disciplined. Recomposition is your playground."} },
    endo: { name:{fr:'Endomorphe',en:'Endomorph'}, desc:{fr:"Tu stockes la graisse facilement mais tu construis un muscle puissant. Ton vrai levier, c'est l'insuline : couper le sucre et tenir un déficit modéré change tout.",en:"You store fat easily but build powerful muscle. Your real lever is insulin: cutting sugar and holding a moderate deficit changes everything."} },
  };

  let answers = {};
  let i = 0;
  let state = 'lead';   // lead | question | loading | result
  let lastR = null;     // dernier résultat (pour re-render si changement de langue)

  // ── ÉTAPE 0 : inscription liste d'attente (avant le test) ──
  function renderLead() {
    state = 'lead';
    document.getElementById('progress').style.width = '0%';
    document.getElementById('back-btn').style.display = 'none';
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem('esp_lead') || '{}'); } catch(e) {}
    const esc = s => (s || '').replace(/"/g, '&quot;');
    document.getElementById('stage').innerHTML = `
      <div class="step lead">
        <div class="q-count">${L('Inscription','Sign-up')}</div>
        <div class="q-title">${L('Débloque ton test','Unlock your test')}</div>
        <p class="lead-sub">${L("Inscris-toi à la liste d'attente pour faire le test et recevoir tes recommandations personnalisées.",'Join the waitlist to take the test and get your personalized recommendations.')}</p>
        <div class="lead-form">
          <div class="lead-row">
            <input class="lead-field" id="ld-prenom" placeholder="${L('Prénom','First name')}" autocomplete="given-name" value="${esc(saved.prenom)}">
            <input class="lead-field" id="ld-nom" placeholder="${L('Nom','Last name')}" autocomplete="family-name" value="${esc(saved.nom)}">
          </div>
          <input class="lead-field" id="ld-email" type="email" placeholder="${L('ton@email.com','you@email.com')}" autocomplete="email" value="${esc(saved.email)}">
          <input class="lead-field" id="ld-tel" type="tel" placeholder="${L('Téléphone (optionnel)','Phone (optional)')}" autocomplete="tel" value="${esc(saved.tel)}">
          <div class="lead-msg" id="ld-msg"></div>
          <button class="btn" id="ld-btn" onclick="submitLead()">${L('Commencer le test →','Start the test →')}</button>
        </div>
        <p class="lead-note">${L('Gratuit · Pas de spam · Désabonnement en 1 clic','Free · No spam · Unsubscribe in 1 click')}</p>
      </div>`;
  }

  async function submitLead() {
    const g = id => ((document.getElementById(id) || {}).value || '').trim();
    const prenom = g('ld-prenom'), nom = g('ld-nom'), email = g('ld-email'), tel = g('ld-tel');
    const msg = document.getElementById('ld-msg');
    ['ld-prenom','ld-email'].forEach(id => document.getElementById(id).classList.remove('error'));
    msg.className = 'lead-msg'; msg.textContent = '';

    if (!prenom) { document.getElementById('ld-prenom').classList.add('error'); msg.className = 'lead-msg err'; msg.textContent = L('Entre ton prénom.','Enter your first name.'); return; }
    if (!email || email.indexOf('@') < 0) { document.getElementById('ld-email').classList.add('error'); msg.className = 'lead-msg err'; msg.textContent = L('Entre un email valide.','Enter a valid email.'); return; }

    const btn = document.getElementById('ld-btn');
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = '...';

    try { localStorage.setItem('esp_lead', JSON.stringify({ prenom, nom, email, tel })); } catch(e) {}

    try {
      const resp = await fetch('/api/waitlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prenom, nom, email, telephone: tel, lang: (window.espGetLang ? window.espGetLang() : 'fr'), source: 'quiz' })
      });
      if (resp.status === 409) {
        msg.className = 'lead-msg ok';
        msg.textContent = L('✓ Tu es déjà inscrit — on lance ton test !','✓ You\'re already signed up — starting your test!');
        setTimeout(startQuestions, 1500);
        return;
      }
      if (resp.status === 200 || resp.status === 201) {
        msg.className = 'lead-msg ok';
        msg.textContent = L('✓ Inscrit ! On lance ton test…','✓ Signed up! Starting your test…');
        setTimeout(startQuestions, 900);
        return;
      }
      throw new Error('HTTP ' + resp.status);
    } catch(err) {
      console.error('lead error', err);
      btn.disabled = false; btn.textContent = orig;
      msg.className = 'lead-msg err';
      msg.textContent = L('Connexion impossible — réessaie.','Connection failed — try again.');
    }
  }

  function startQuestions() {
    i = 0;
    render();
  }

  function render() {
    state = 'question';
    document.getElementById('progress').style.width = ((i) / STEPS.length * 100) + '%';
    document.getElementById('back-btn').style.display = i > 0 ? 'block' : 'none';
    const s = STEPS[i];
    const stage = document.getElementById('stage');

    let html = `<div class="step"><div class="q-count">${L('Question','Question')} ${i+1} / ${STEPS.length}</div><div class="q-title">${T(s.q)}</div>`;

    if (s.type === 'choice') {
      html += '<div class="options">';
      s.options.forEach(o => {
        html += `<button class="opt" onclick="choose('${s.key}','${o.v}')"><span class="opt-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${o.icon || ''}</svg></span><span class="opt-label">${T(o.l)}</span></button>`;
      });
      html += '</div>';
    } else {
      const cur = answers[s.key] || '';
      html += `<div class="num-wrap">
        <input class="num-input" id="num" type="number" inputmode="numeric" placeholder="${s.ph}" value="${cur}" min="${s.min}" max="${s.max}">
        <div class="num-unit">${T(s.unit)}</div>
        <div class="num-err" id="num-err"></div>
      </div>
      <button class="btn" onclick="submitNum()">${L('Continuer →','Continue →')}</button>`;
    }
    html += '</div>';
    stage.innerHTML = html;

    if (s.type === 'number') {
      const inp = document.getElementById('num');
      inp.focus();
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitNum(); });
    }
  }

  function choose(key, val) { answers[key] = val; next(); }

  function submitNum() {
    const s = STEPS[i];
    const inp = document.getElementById('num');
    const val = parseInt(inp.value, 10);
    const err = document.getElementById('num-err');
    if (isNaN(val) || val < s.min || val > s.max) {
      err.textContent = L(`Entre une valeur entre ${s.min} et ${s.max}.`, `Enter a value between ${s.min} and ${s.max}.`);
      return;
    }
    answers[s.key] = val;
    next();
  }

  function next() {
    i++;
    if (i >= STEPS.length) finish();
    else render();
  }

  function goBack() { if (i > 0) { i--; render(); } }

  function round10(n) { return Math.round(n / 10) * 10; }

  function compute() {
    const poids = answers.poids, taille = answers.taille, age = answers.age;
    const homme = answers.genre === 'homme';
    const imc = poids / Math.pow(taille / 100, 2);

    // BMR Mifflin-St Jeor
    let bmr = 10 * poids + 6.25 * taille - 5 * age + (homme ? 5 : -161);
    const af = { sed: 1.2, leger: 1.375, modere: 1.55, intense: 1.725 }[answers.activite] || 1.375;
    let tdee = bmr * af;
    let cal = tdee;
    if (answers.objectif === 'perte') cal = tdee - 450;
    else if (answers.objectif === 'muscle') cal = tdee + 250;
    else if (answers.objectif === 'recomp') cal = tdee - 200;
    cal = round10(Math.max(1300, cal));

    // Archétype
    let arch;
    if (answers.stockage === 'mince' || imc < 20) arch = 'ecto';
    else if ((answers.stockage === 'ventre' || answers.stockage === 'partout') && imc >= 26) arch = 'endo';
    else if (imc >= 28) arch = 'endo';
    else arch = 'meso';

    // Masse grasse estimée (approx, +7% pour femmes)
    let bf;
    if (imc < 22) bf = homme ? '12–17 %' : '19–24 %';
    else if (imc < 27) bf = homme ? '18–24 %' : '25–31 %';
    else bf = homme ? '25 %+' : '32 %+';

    return { imc: imc.toFixed(1), cal, arch, bf };
  }

  function recosFor(arch, objectif) {
    const base = {
      ecto: [
        L('Mange en léger surplus calorique : ton corps brûle vite, il faut le nourrir.','Eat in a slight calorie surplus: your body burns fast, you need to feed it.'),
        L('Priorise les charges lourdes et les exercices polyarticulaires (squat, deadlift).','Prioritize heavy loads and compound lifts (squat, deadlift).'),
        L('Limite le cardio intense et vise 1,8 g de protéines par kilo.','Limit intense cardio and aim for 1.8g of protein per kilo.')
      ],
      meso: [
        L('La recomposition est possible : muscle + perte de gras en même temps.','Recomposition is possible: build muscle and lose fat at the same time.'),
        L('Muscu 4×/semaine, déficit ou surplus léger selon ton objectif.','Strength training 4×/week, slight deficit or surplus depending on your goal.'),
        L('Ta régularité est ton super-pouvoir : ne casse pas la chaîne.','Your consistency is your superpower: don\'t break the chain.')
      ],
      endo: [
        L('Coupe le sucre ajouté : c’est ton levier n°1 sur l’insuline.','Cut added sugar: it\'s your #1 lever on insulin.'),
        L('Déficit modéré (−400 kcal) + musculation + marche quotidienne.','Moderate deficit (−400 kcal) + strength training + daily walking.'),
        L('Protéines élevées à chaque repas pour préserver ton muscle.','High protein at every meal to preserve your muscle.')
      ]
    };
    return base[arch];
  }

  function finish() {
    state = 'loading';
    document.getElementById('progress').style.width = '100%';
    document.getElementById('back-btn').style.display = 'none';
    const stage = document.getElementById('stage');

    // Écran de calcul
    stage.innerHTML = `<div class="loader">
      <div class="loader-ring"></div>
      <h2>${L('Analyse de ton corps…','Analyzing your body…')}</h2>
      <p>${L('On calcule ton archétype et tes recommandations.','Calculating your archetype and recommendations.')}</p>
    </div>`;

    const r = compute();
    lastR = r;
    const a = ARCH[r.arch];
    const recos = recosFor(r.arch, answers.objectif);

    // Sauvegarde pour la landing / conversion
    try {
      localStorage.setItem('esp_quiz', JSON.stringify({ ...answers, ...r, ts: Date.now() }));
    } catch (e) {}

    setTimeout(() => showResult(r, a, recos), 2200);
  }

  function showResult(r, a, recos) {
    state = 'result';
    const stage = document.getElementById('stage');
    const check = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    let recoHtml = recos.map(t => `<div class="reco-item"><span class="reco-ico">${check}</span><span class="t">${t}</span></div>`).join('');

    const f = (answers.genre === 'femme') ? '-f' : '';
    const archImg = { ecto:'ecto'+f+'.webp', meso:'meso'+f+'.webp', endo:'endo'+f+'.webp' }[r.arch];
    stage.innerHTML = `<div class="result">
      <div class="res-label">${L('Ton archétype corporel','Your body archetype')}</div>
      <img class="res-img" src="${archImg}" alt="${T(a.name)}">
      <div class="res-name">${T(a.name)}</div>
      <div class="res-desc">${T(a.desc)}</div>
      <div class="res-stats">
        <div class="res-stat"><div class="v">${r.imc}</div><div class="l">${L('IMC','BMI')}</div></div>
        <div class="res-stat"><div class="v">${r.bf}</div><div class="l">${L('Masse grasse est.','Est. body fat')}</div></div>
        <div class="res-stat"><div class="v">${r.cal}</div><div class="l">${L('Kcal / jour cible','Target kcal / day')}</div></div>
      </div>
      <div class="res-reco">
        <div class="rtitle">${L('Tes 3 priorités','Your 3 priorities')}</div>
        ${recoHtml}
      </div>
      <div class="res-teaser">🔓 ${L("Ton <b>plan complet</b> — nutrition + entraînement semaine par semaine, adapté à ton archétype — t'attend sur Espritum.",'Your <b>complete plan</b> — nutrition + training week by week, tailored to your archetype — is waiting on Espritum.')}</div>
      <a class="btn" id="cta" href="index.html?from=quiz&archetype=${r.arch}">${L('Découvrir la méthode →','Discover the method →')}</a>
    </div>`;
  }

  // ── Re-render au changement de langue (FR/EN) ──
  window.onEspLangChange = function () {
    if (state === 'lead') {
      const g = id => ((document.getElementById(id) || {}).value) || '';
      try { localStorage.setItem('esp_lead', JSON.stringify({ prenom:g('ld-prenom'), nom:g('ld-nom'), email:g('ld-email'), tel:g('ld-tel') })); } catch(e) {}
      renderLead();
    } else if (state === 'question') {
      render();
    } else if (state === 'result' && lastR) {
      showResult(lastR, ARCH[lastR.arch], recosFor(lastR.arch, answers.objectif));
    }
  };

  renderLead();
</script>
</body>
</html>
