<!DOCTYPE html>
<html lang="fr">
<head>
<script src="page-loader.js"></script>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
<title>Espritum — Classement</title>
<link rel="stylesheet" href="https://use.typekit.net/gld3dja.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Condensed:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Semi+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<style>
  :root {
    --red: #c82828;
    --bg: #080808;
    --bg2: #0d0d0d;
    --bg3: #111111;
    --border: #1e1e1e;
    --muted: #555;
    --muted2: #333;
    --gold: #f4c430;
    --silver: #aaaaaa;
    --bronze: #cd7f32;
    --font-display: 'acumin-pro-extra-condensed', 'Bebas Neue', sans-serif;
    --font-body: 'acumin-pro-condensed', 'Barlow Semi Condensed', sans-serif;
    --sidebar: 80px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: var(--bg); color: #fff; font-family: var(--font-body); display: flex; }

  /* ── SIDEBAR ── */
  .sidebar { width: var(--sidebar); min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 50; align-items: center; }
  .sidebar-brand { display: flex; align-items: center; justify-content: center; padding: 22px 0 26px; text-decoration: none; }
  .sidebar-logo { width: 38px; height: 38px; object-fit: contain; border-radius: 8px; }
  .sidebar-name { display: none; }
  .sidebar-nav { flex: 1; padding: 8px 0; display: flex; flex-direction: column; gap: 6px; align-items: center; width: 100%; }
  .nav-section-label { display: none; }
  .nav-item { display: flex; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 10px; text-decoration: none; transition: background 0.2s; color: transparent; font-size: 0; flex-shrink: 0; }
  .nav-item span:not(.nav-icon):not(.nav-lock) { display: none; }
  .nav-item:hover { background: rgba(255,255,255,0.04); }
  .nav-item.active { background: rgba(255,255,255,0.06); }
  .nav-icon { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; flex-shrink: 0; }
  .nav-icon img { width: 26px; height: 26px; object-fit: contain; display: block; }
  .sidebar-bottom { padding: 12px 0 18px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .user-card { display: flex; align-items: center; justify-content: center; padding: 0; border-radius: 50%; cursor: pointer; transition: opacity 0.2s; }
  .user-card > div:not(.user-avatar) { display: none; }
  .user-card:hover { opacity: 0.8; }
  .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 16px; color: #ddd; flex-shrink: 0; }
  .user-name, .user-plan { display: none; }
  .nav-item.locked { opacity: 0.4; cursor: not-allowed; }
  .nav-item.locked:hover { background: transparent; }
  .nav-lock { font-size: 11px; margin-left: auto; opacity: 0.6; }

  /* ── MAIN ── */
  .main { margin-left: var(--sidebar); flex: 1; min-height: 100vh; display: flex; flex-direction: column; overflow-y: auto; }

  /* ── TOPBAR ── */
  .topbar { padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); position: sticky; top: 0; z-index: 40; }
  .topbar-title { font-family: var(--font-display); font-size: 32px; letter-spacing: 2px; text-transform: uppercase; line-height: 1; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-streak-pill {
    background: #111; border: 2px solid var(--red); border-radius: 99px;
    padding: 6px 14px; font-family: var(--font-display); font-size: 17px;
    letter-spacing: 1px; color: #fff;
  }
  .topbar-avatar-pill {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(200,40,40,0.1); border: 2px solid var(--red);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 14px; color: var(--red); flex-shrink: 0;
  }

  /* ── CONTENT ── */
  .content { padding: 12px 40px 48px; display: flex; flex-direction: column; gap: 20px; }

  /* ── TABS ── */
  .tab-card {
    background: #131313; border: 1px solid var(--border);
    border-radius: 16px; padding: 6px; display: flex; gap: 6px;
  }
  .main-tab {
    flex: 1; padding: 11px 6px; border-radius: 12px;
    font-family: var(--font-display); font-size: 15px; letter-spacing: 2px;
    color: var(--muted); text-align: center; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase;
  }
  .main-tab.active { background: var(--red); color: #fff; box-shadow: 0 4px 16px rgba(200,40,40,0.3); }
  .rank-panel { display: none; flex-direction: column; gap: 20px; }
  .rank-panel.active { display: flex; }

  /* ── MY POSITION CARD ── */
  .my-position-card {
    display: flex; align-items: center; gap: 14px;
    background: rgba(200,40,40,0.08); border: 1px solid rgba(200,40,40,0.25);
    border-radius: 16px; padding: 18px 20px;
  }
  .my-pos-rank-num {
    font-family: var(--font-display); font-size: 52px; color: var(--red);
    letter-spacing: 2px; line-height: 1; min-width: 70px;
  }
  .my-pos-avatar {
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px solid var(--red); background: rgba(200,40,40,0.12);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 18px; color: var(--red); flex-shrink: 0;
  }
  .my-pos-info { flex: 1; min-width: 0; }
  .my-pos-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .my-pos-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .my-pos-plan-pill {
    display: inline-block; padding: 3px 10px; border-radius: 99px;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    background: rgba(200,40,40,0.15); border: 1px solid rgba(200,40,40,0.4); color: var(--red);
  }
  .my-pos-streak-block { text-align: center; flex-shrink: 0; }
  .my-pos-streak-num { font-family: var(--font-display); font-size: 24px; color: #fff; letter-spacing: 1px; line-height: 1.1; }
  .my-pos-streak-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 3px; }

  /* ── PODIUM ── */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; padding: 12px 0 0; }
  .podium-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .podium-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 28px; border: 3px solid; position: relative;
  }
  .podium-crown { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 20px; }
  .podium-item.gold   .podium-avatar { border-color: var(--gold);   background: rgba(244,196,48,0.12);  color: var(--gold); }
  .podium-item.silver .podium-avatar { border-color: var(--silver); background: rgba(170,170,170,0.10); color: var(--silver); }
  .podium-item.bronze .podium-avatar { border-color: var(--bronze); background: rgba(205,127,50,0.10);  color: var(--bronze); }
  .podium-name  { font-family: var(--font-display); font-size: 15px; letter-spacing: 1px; text-transform: uppercase; color: #fff; text-align: center; }
  .podium-score { font-size: 11px; color: var(--muted); text-align: center; }
  .podium-block { display: flex; align-items: flex-end; justify-content: center; border-radius: 8px 8px 0 0; width: 90px; }
  .podium-rank  { font-family: var(--font-display); font-size: 36px; padding: 14px 0; }
  .podium-item.gold   .podium-block { background: rgba(244,196,48,0.12);  border: 1px solid rgba(244,196,48,0.3);  border-bottom: none; height: 110px; }
  .podium-item.gold   .podium-rank  { color: var(--gold); }
  .podium-item.silver .podium-block { background: rgba(170,170,170,0.08); border: 1px solid rgba(170,170,170,0.2); border-bottom: none; height: 75px; }
  .podium-item.silver .podium-rank  { color: var(--silver); }
  .podium-item.bronze .podium-block { background: rgba(205,127,50,0.08);  border: 1px solid rgba(205,127,50,0.2);  border-bottom: none; height: 55px; }
  .podium-item.bronze .podium-rank  { color: var(--bronze); }

  /* ── CARD ── */
  .card { background: #131313; border-radius: 16px; padding: 22px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 3px; text-transform: uppercase; }

  /* ── RANK LIST ── */
  .rank-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; background: #1a1a1a; border: 1px solid transparent;
    border-radius: 12px; transition: background 0.15s;
  }
  .rank-item:hover { background: #1f1f1f; }
  .rank-item.me {
    background: rgba(200,40,40,0.10); border-color: rgba(200,40,40,0.35);
  }
  .rank-item.me .rank-name { color: var(--red); }
  .rank-item.me .rank-num.normal { color: var(--red); }
  .rank-item.me .rank-detail { color: rgba(200,40,40,0.65); }
  .rank-item.me .rank-score-val { color: var(--red); }
  .rank-num { font-family: var(--font-display); font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .rank-num.gold   { color: var(--gold); }
  .rank-num.silver { color: var(--silver); }
  .rank-num.bronze { color: var(--bronze); }
  .rank-num.normal { color: var(--muted); }
  .rank-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 17px; border: 2px solid transparent;
  }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 14px; color: #ddd; font-weight: 600; margin-bottom: 2px; }
  .rank-detail { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-score { text-align: right; flex-shrink: 0; }
  .rank-score-val { font-family: var(--font-display); font-size: 28px; color: #fff; line-height: 1; }
  .rank-score-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }

  /* ── FRIENDS PANEL ── */
  .friends-search { display: flex; align-items: center; gap: 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
  .friends-search input { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; color: #fff; font-family: var(--font-body); }
  .friends-search input::placeholder { color: var(--muted); }
  .friends-grid-new { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .friend-card-new { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
  .friend-avatar-wrap { position: relative; }
  .friend-avatar-new { width: 56px; height: 56px; border-radius: 50%; background: var(--bg3); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 20px; }
  .friend-rank-badge { position: absolute; bottom: -4px; right: -4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 99px; padding: 1px 5px; font-family: var(--font-display); font-size: 11px; color: var(--muted); }
  .friend-rank-badge.top { color: #f4c430; border-color: #f4c430; }
  .friend-name-new { font-size: 10px; font-weight: 600; color: #ccc; text-align: center; }
  .friend-streak-new { font-size: 9px; color: var(--muted); }
  .friends-section-label { font-family: var(--font-display); font-size: 16px; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; }
  .friends-section-label span { color: var(--red); }

  /* ── LOADING ── */
40% { opacity: 1; } }

  /* ── UPGRADE MODAL ── */
  .upgrade-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; }
  .upgrade-modal.open { display: flex; }
  .upgrade-box { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 10px; padding: 36px; width: 420px; max-width: 95vw; text-align: center; }
  .upgrade-icon { font-size: 48px; margin-bottom: 16px; }
  .upgrade-title { font-family: var(--font-display); font-size: 32px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .upgrade-desc { font-size: 14px; color: #666; line-height: 1.7; font-weight: 300; margin-bottom: 24px; }
  .upgrade-btn { width: 100%; padding: 15px; background: #c82828; border: none; border-radius: 4px; color: #fff; font-family: var(--font-body, sans-serif); font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; }
  .upgrade-btn:hover { background: #d93030; }
  .upgrade-cancel { font-size: 12px; color: #555; cursor: pointer; letter-spacing: 1px; }
  .upgrade-cancel:hover { color: #888; }

  /* ── MOBILE NAV ── */
  .mobile-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: #111111; padding: 12px 0 max(12px, env(safe-area-inset-bottom));
    z-index: 100; grid-template-columns: repeat(5, 1fr);  border-radius: 20px 20px 0 0; box-shadow: 0 -6px 24px rgba(0,0,0,0.7); }
  .mobile-nav-item { display: flex; align-items: center; justify-content: center; padding: 6px 4px; text-decoration: none; transition: opacity 0.2s; cursor: pointer; opacity: 0.5; }
  .mobile-nav-item.active { opacity: 1; }
  .mobile-nav-icon img { width: 26px; height: 26px; object-fit: contain; display: block; }

  /* ── COACH FAB ── */
  .coach-fab { position: fixed; bottom: 28px; right: 28px; width: 56px; height: 56px; border-radius: 50%; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 6px 24px rgba(200,40,40,0.4), 0 2px 8px rgba(0,0,0,0.3); z-index: 90; transition: transform 0.2s, box-shadow 0.2s; }
  .coach-fab:hover { transform: scale(1.06); box-shadow: 0 8px 30px rgba(200,40,40,0.55); }
  .coach-fab:active { transform: scale(0.96); }
  /* ── ANTI-ZOOM ── */
  html { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; touch-action: pan-x pan-y; }
  input, select, textarea { font-size: 16px !important; }
  * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  body { overflow-x: hidden; }

  /* ── BULGARIAN FONT ── */
  html[lang="bg"] * { font-family: 'Sofia Sans Condensed', var(--font-body, sans-serif) !important; }
  html[lang="bg"] .topbar-title, html[lang="bg"] .card-title { font-family: 'Sofia Sans Condensed', var(--font-display, sans-serif) !important; }

  /* ── RESPONSIVE ── */
  @media (max-width: 1024px) {
    .sidebar { display: none !important; }
    .main { margin-left: 0; padding-bottom: 72px; overflow-x: hidden; }
    .mobile-nav { display: grid; grid-template-columns: repeat(5, 1fr); position: fixed; bottom: 0; left: 0; right: 0; width: 100%; background: #111111; padding: 10px 0 max(14px, env(safe-area-inset-bottom)); border-radius: 20px 20px 0 0; box-shadow: 0 -6px 24px rgba(0,0,0,0.85); z-index: 100; }
    .topbar { margin-top: 44px; padding: 14px 20px; }
    .topbar-title { font-size: 24px; }
    .content { padding: 12px 16px 80px; overflow-x: hidden; }
    .podium { gap: 8px; }
    .podium-avatar { width: 54px; height: 54px; font-size: 22px; }
    .podium-block { width: 76px; }
    .friends-grid-new { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .coach-fab { bottom: 80px; right: 18px; width: 50px; height: 50px; }
    * { max-width: 100%; }
    img { max-width: 100%; }
  }
  @media (max-width: 380px) {
    .my-pos-rank-num { font-size: 40px; min-width: 54px; }
    .podium-block { width: 68px; }
    .friends-grid-new { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .friend-avatar-new { width: 46px; height: 46px; font-size: 16px; }
  }

  /* ── STREAK ICON ── */
  .si { height: 0.8em; width: auto; vertical-align: -0.15em; display: inline-block; margin-right: 5px; }

  /* ── POSTS GRID (3 permanents) ── */
  .ps-posts-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
    padding: 0 20px 24px;
  }
  .ps-post-slot {
    aspect-ratio: 1; border-radius: 10px; overflow: hidden;
    background: #1a1a1a; border: 1px solid #222;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
  }
  .ps-post-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ps-post-slot.empty { border: 1px dashed #2a2a2a; cursor: default; }
  .ps-post-slot.empty::after {
    content: ''; display: block; width: 20px; height: 20px;
    border-radius: 50%; background: #222;
  }
  .ps-post-slot:not(.empty):active { opacity: 0.8; }

  /* ── CLICKABLE RANK ITEMS ── */
  .rank-item { cursor: pointer; }
  .rank-item:active { opacity: 0.8; }
  .friend-card-new { cursor: pointer; }
  .friend-card-new:active { opacity: 0.75; }
  .podium-item { cursor: pointer; }

  /* ── PROFILE OVERLAY ── */
  .profile-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75); z-index: 300;
    display: none; align-items: flex-end;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .profile-overlay.open { display: flex; }
  .profile-sheet {
    width: 100%; background: #0d0d0d; border-radius: 24px 24px 0 0;
    border-top: 1px solid #1e1e1e; max-height: 88vh; overflow-y: auto;
    padding-bottom: max(32px, env(safe-area-inset-bottom));
    animation: slideUp 0.28s cubic-bezier(.32,1,.55,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .ps-handle { width: 40px; height: 4px; background: #2a2a2a; border-radius: 99px; margin: 14px auto 0; }
  .ps-close-btn {
    position: absolute; top: 18px; right: 18px;
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: #1e1e1e; color: #888; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .ps-close-btn:active { opacity: 0.7; }
  .ps-header {
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 24px 20px; gap: 8px; position: relative;
  }
  .ps-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    border: 3px solid var(--red); background: rgba(200,40,40,0.12);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 32px; flex-shrink: 0;
    background-size: cover; background-position: center;
  }
  .ps-name { font-family: var(--font-display); font-size: 26px; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
  .ps-plan { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .ps-stats {
    display: flex; gap: 20px; margin-top: 4px;
    font-family: var(--font-display); font-size: 15px; color: #bbb; letter-spacing: 1px;
  }
  .ps-stats span { display: flex; align-items: center; gap: 3px; }
  .ps-follow-btn {
    margin-top: 10px; padding: 10px 28px; border-radius: 99px;
    border: 2px solid var(--red); background: transparent;
    color: var(--red); font-family: var(--font-display); font-size: 16px;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    transition: all 0.22s; display: inline-flex; align-items: center; gap: 7px;
    min-width: 140px; justify-content: center;
  }
  .ps-follow-btn.following {
    background: #0d2b18; border-color: #2ecc71; color: #2ecc71;
  }
  .ps-follow-btn:active { transform: scale(0.95); }
  .ps-divider { height: 1px; background: #1a1a1a; margin: 0 0 16px; }
  .ps-section-label {
    font-family: var(--font-display); font-size: 13px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase; padding: 0 20px 10px;
  }
  .ps-photos-scroll {
    display: flex; overflow-x: auto; gap: 8px; padding: 0 20px 16px;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  }
  .ps-photos-scroll::-webkit-scrollbar { display: none; }
  .ps-photo-thumb-wrap {
    position: relative; flex-shrink: 0; scroll-snap-align: start;
    width: 130px; height: 175px; border-radius: 14px; overflow: hidden;

      document.getElementById('sidebar-avatar').textContent = initiale;
      document.getElementById('sidebar-name').textContent = prenom;
      document.getElementById('sidebar-plan').textContent = planLabel[plan];

      fillTopbar(initiale, streak);

      const myEntry = { id:'me', prenom, nom:'', plan, streak, seances, color:'#c82828', isMe: true, weeklySeances: 4 };
      const previewUsers = [myEntry];
      const myRank = 1;

      fillMyPosition(myRank, initiale, prenom, seances, streak, plan);
      fillFriendsPanel(initiale, prenom, streak, plan, myRank);
      renderPodium(previewUsers.slice(0, 3));
      renderRankList(previewUsers);
      renderWeeklyList(previewUsers);
      renderFriendsGrid(previewUsers);
      initFreemium(plan);
      return;
    }
    // ────────────────────────────────────────────────────────────

    // ── Auth (bloquant — pas de classement sans session) ──
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'inscription.html'; return; }
      myUserId = session.user.id;
    } catch(e) { console.error('Auth error', e); return; }

    // ── 1. Users — essai avec colonnes posts, fallback sans ──
    let usersRaw = null;
    try {
      const r = await sb.from('users')
        .select('id, prenom, nom, plan, streak, avatar_url, post1_url, post2_url, post3_url')
        .order('streak', { ascending: false }).limit(100);
      if (r.error) throw r.error;
      usersRaw = r.data;
    } catch(e) {
      try {
        const r = await sb.from('users')
          .select('id, prenom, nom, plan, streak, avatar_url')
          .order('streak', { ascending: false }).limit(100);
        usersRaw = r.data;
      } catch(e2) { console.error('Users error', e2); }
    }

    // ── 2. Séances ─────────────────────────────────────────
    let seancesMap = {};
    try {
      const { data: wkRows } = await sb.from('workouts').select('user_id').eq('termine', true);
      (wkRows || []).forEach(w => { seancesMap[w.user_id] = (seancesMap[w.user_id] || 0) + 1; });
    } catch(e) { /* workouts non dispo */ }

    // ── 3. Follows (table peut ne pas exister encore) ─────
    try {
      const { data: followData } = await sb.from('friendships').select('following_id').eq('follower_id', myUserId);
      (followData || []).forEach(f => followingSet.add(f.following_id));
    } catch(e) { /* friendships pas encore créé */ }

    // ── 4. Classement ──────────────────────────────────────
    const allUsers = (usersRaw || []).map(u => ({
      ...u,
      nom: u.nom ? u.nom.charAt(0).toUpperCase() + '.' : '',
      seances: seancesMap[u.id] || 0,
      color: planColor[u.plan || 'gratuit'],
      isMe: u.id === myUserId
    })).sort((a, b) => calcPts(b) - calcPts(a));

    const me = allUsers.find(u => u.isMe) || {};
    const prenom = me.prenom || 'Guerrier';
    const initiale = prenom[0].toUpperCase();
    const plan = me.plan || 'gratuit';
    const streak = me.streak || 0;
    const seances = me.seances || 0;
    const myRank = allUsers.findIndex(u => u.isMe) + 1;

    document.getElementById('sidebar-avatar').textContent = initiale;
    document.getElementById('sidebar-name').textContent = prenom;
    document.getElementById('sidebar-plan').textContent = planLabel[plan];
    fillTopbar(initiale, streak);
    initFreemium(plan);
    fillMyPosition(myRank, initiale, prenom, seances, streak, plan);
    renderPodium(allUsers.slice(0, 3));
    renderRankList(allUsers);
    allUsersRef = allUsers;

    // Friends tab
    const followedUsers = allUsers.filter(u => followingSet.has(u.id));
    renderFriendsGrid(followedUsers);
    const friendsWithMe = [me, ...followedUsers].sort((a, b) => calcPts(b) - calcPts(a));
    fillFriendsPanel(initiale, prenom, streak, plan, friendsWithMe.findIndex(u => u.isMe) + 1);

    // ── 5. Weekly (optionnel, ne bloque pas le rendu) ─────
    try {
      const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
      const weekAgoStr = weekAgo.toISOString().slice(0, 10);
      const { data: wkWeekRows } = await sb.from('workouts').select('user_id').eq('termine', true).gte('date', weekAgoStr);
      const weeklyMap = {};
      (wkWeekRows || []).forEach(w => { weeklyMap[w.user_id] = (weeklyMap[w.user_id] || 0) + 1; });
      const weeklyUsers = allUsers.map(u => ({ ...u, weeklySeances: weeklyMap[u.id] || 0 }))
        .sort((a, b) => (b.weeklySeances - a.weeklySeances) || (b.streak - a.streak));
      const meW = weeklyUsers.find(u => u.isMe) || {};
      const myWRank = weeklyUsers.findIndex(u => u.isMe) + 1;
      const wAv = document.getElementById('weekly-my-avatar');
      if (wAv) { if (meW.avatar_url) { wAv.style.cssText=`background-image:url('${meW.avatar_url}');background-size:cover;background-position:center;`; wAv.textContent=''; } else wAv.textContent=initiale; }
      const _s = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
      _s('weekly-my-rank','#'+(myWRank||'—')); _s('weekly-my-name',prenom);
      _s('weekly-my-detail',(meW.weeklySeances||0)+' séances cette semaine');
      const wSt=document.getElementById('weekly-my-streak'); if(wSt) wSt.innerHTML='<img class="si" src="icons/streak-icon.png"> '+streak;
      renderWeeklyList(weeklyUsers);
    } catch(e) { console.warn('Weekly error:', e); }
  }

  function renderPodium(top3) {
    // Display order: silver (#2) | gold (#1) | bronze (#3)
    const slots = [
      { user: top3[1], cls: 'silver', rank: 2 },
      { user: top3[0], cls: 'gold',   rank: 1 },
      { user: top3[2], cls: 'bronze', rank: 3 },
    ].filter(s => s.user);

    document.getElementById('podium').innerHTML = slots.map(({ user: u, cls, rank }) => {
      const avatarStyle = u.avatar_url
        ? `style="background-image:url('${u.avatar_url}');background-size:cover;background-position:center;color:transparent;font-size:0;"`
        : `style="color:${u.color || '#888'};"`;
      return `
      <div class="podium-item ${cls}">
        <div class="podium-avatar" ${avatarStyle}>${u.avatar_url ? '' : u.prenom[0]}</div>
        <div class="podium-name">${u.prenom} ${u.nom || ''}</div>
        <div class="podium-score"><img class="si" src="icons/streak-icon.png" alt="streak"> ${u.streak}j streak</div>
        <div class="podium-block"><div class="podium-rank">${rank}</div></div>
      </div>`;
    }).join('');
  }

  function renderRankList(users) {
    const list = document.getElementById('rank-list');
    const rankCls  = ['gold', 'silver', 'bronze'];
    const avatarBorders = [
      'rgba(244,196,48,0.5)', 'rgba(170,170,170,0.4)', 'rgba(205,127,50,0.4)'
    ];

    list.innerHTML = users.slice(0, 20).map((u, i) => {
      const pts = calcPts(u);
      const rc = i < 3 ? rankCls[i] : 'normal';
      const ab = i < 3
        ? `border-color:${avatarBorders[i]};background:${u.color}18;`
        : `border-color:#2a2a2a;background:#1f1f1f;`;
      const avatarContent = u.avatar_url
        ? `style="${ab}background-image:url('${u.avatar_url}');background-size:cover;background-position:center;" `
        : `style="${ab}color:${i < 3 ? u.color : '#888'};"`;
      return `
        <div class="rank-item ${u.isMe ? 'me' : ''}" onclick="openProfile('${u.id}')">
          <div class="rank-num ${rc}">${i + 1}</div>
          <div class="rank-avatar" ${avatarContent}>${u.avatar_url ? '' : u.prenom[0]}</div>
          <div class="rank-info">
            <div class="rank-name">${u.prenom} ${u.nom || ''}${u.isMe ? ' <span style="color:var(--red);font-size:10px;letter-spacing:1px;">TOI</span>' : ''}</div>
            <div class="rank-detail">${u.seances} séances · ${planLabel[u.plan] || 'Gratuit'}</div>
          </div>
          <div class="rank-score">
            <div class="rank-score-val">${pts}</div>
            <div class="rank-score-label">PTS</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderWeeklyList(users) {
    const list = document.getElementById('weekly-rank-list');
    if (!list) return;
    const rankCls = ['gold', 'silver', 'bronze'];
    const avatarBorders = [
      'rgba(244,196,48,0.5)', 'rgba(170,170,170,0.4)', 'rgba(205,127,50,0.4)'
    ];

    list.innerHTML = users.slice(0, 20).map((u, i) => {
      const rc = i < 3 ? rankCls[i] : 'normal';
      const ab = i < 3
        ? `border-color:${avatarBorders[i]};background:${u.color}18;`
        : `border-color:#2a2a2a;background:#1f1f1f;`;
      const avatarContent = u.avatar_url
        ? `style="${ab}background-image:url('${u.avatar_url}');background-size:cover;background-position:center;"`
        : `style="${ab}color:${i < 3 ? u.color : '#888'};"`;
      return `
        <div class="rank-item ${u.isMe ? 'me' : ''}" onclick="openProfile('${u.id}')">
          <div class="rank-num ${rc}">${i + 1}</div>
          <div class="rank-avatar" ${avatarContent}>${u.avatar_url ? '' : u.prenom[0]}</div>
          <div class="rank-info">
            <div class="rank-name">${u.prenom} ${u.nom || ''}${u.isMe ? ' <span style="color:var(--red);font-size:10px;letter-spacing:1px;">TOI</span>' : ''}</div>
            <div class="rank-detail">${u.weeklySeances || 0} séances · <img class="si" src="icons/streak-icon.png" alt="streak"> ${u.streak}j</div>
          </div>
          <div class="rank-score">
            <div class="rank-score-val">${u.weeklySeances || 0}</div>
            <div class="rank-score-label">SÉANCES</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderFriendsGrid(allUsers) {
    const grid = document.getElementById('friends-grid');
    if (!grid) return;

    grid.innerHTML = allUsers.map((u, i) => {
      const rank = i + 1;
      const isTop = rank <= 3;
      const avatarStyle = u.avatar_url
        ? `background-image:url('${u.avatar_url}');background-size:cover;background-position:center;color:transparent;font-size:0;`
        : `color:${u.color || '#888'};`;
      const rankClass = isTop ? 'top' : '';
      const meLabel = u.isMe ? ' ★' : '';
      return `
        <div class="friend-card-new" onclick="openProfile('${u.id}')">
          <div class="friend-avatar-wrap">
            <div class="friend-avatar-new" style="${avatarStyle}">${u.avatar_url ? '' : u.prenom[0]}</div>
            <div class="friend-rank-badge ${rankClass}">#${rank}</div>
          </div>
          <div class="friend-name-new">${u.prenom}${meLabel}</div>
          <div class="friend-streak-new"><img class="si" src="icons/streak-icon.png" alt="streak"> ${u.streak}j</div>
        </div>
      `;
    }).join('');

    if (!users.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px;letter-spacing:1px;">Suis des guerriers pour les voir ici.</div>';
    }
  }

  // ══════════════════════════════════════════════
  //  SOCIAL — Profile sheet + Photo viewer + Likes
  // ══════════════════════════════════════════════

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('profile-overlay')) closeProfile();
  }

  function closeProfile() {
    document.getElementById('profile-overlay').classList.remove('open');
  }

  async function openProfile(userId) {
    currentProfileUserId = userId;
    const user = allUsersRef.find(u => u.id === userId);
    if (!user) return;

    // Fill avatar
    const psAv = document.getElementById('ps-avatar');
    psAv.textContent = '';
    psAv.style.backgroundImage = user.avatar_url ? `url('${user.avatar_url}')` : 'none';
    psAv.style.color = user.avatar_url ? 'transparent' : (user.color || '#c82828');
    if (!user.avatar_url) psAv.textContent = user.prenom[0];

    document.getElementById('ps-name').textContent = `${user.prenom} ${user.nom || ''}`.trim();
    document.getElementById('ps-plan').textContent = planLabel[user.plan] || 'Gratuit';
    document.getElementById('ps-stats').innerHTML =
      `<span><img class="si" src="icons/streak-icon.png"> ${user.streak}j</span>
       <span>· ${user.seances} séances</span>
       <span>· ${calcPts(user)} pts</span>`;

    // Follow button
    const followBtn = document.getElementById('ps-follow-btn');
    if (userId === myUserId) {
      followBtn.style.display = 'none';
    } else {
      followBtn.style.display = 'inline-flex';
      _refreshFollowBtn(followBtn, followingSet.has(userId));
    }

    // Posts permanents (3 slots)
    _renderPosts(user);

    // Reset moments
    document.getElementById('ps-photos').innerHTML =
      '<div style="padding:0 20px;color:var(--muted);font-size:12px;">Chargement...</div>';
    document.getElementById('ps-no-photos').style.display = 'none';

    document.getElementById('profile-overlay').classList.add('open');
    await _loadPhotos(userId);
  }

  function _renderPosts(user) {
    const grid = document.getElementById('ps-posts-grid');
    if (!grid) return;
    const posts = [user.post1_url, user.post2_url, user.post3_url];
    // Store posts for fullscreen viewer (reuse currentProfilePhotos slot)
    const postObjs = posts.filter(Boolean).map(url => ({ photo_url: url, likesCount: 0, userLiked: false, isPost: true }));

    grid.innerHTML = posts.map((url, i) => {
      if (url) {
        return `<div class="ps-post-slot" onclick="openPostViewer(${i}, ${JSON.stringify(posts)})">
          <img src="${url}" alt="post ${i+1}" loading="lazy">
        </div>`;
      }
      return `<div class="ps-post-slot empty"></div>`;
    }).join('');
  }

  function openPostViewer(index, posts) {
    // Charge les 3 posts dans le viewer plein écran
    const validPosts = posts.map(url => url ? { photo_url: url, likesCount: 0, userLiked: false } : null).filter(Boolean);
    const clickedUrl = posts[index];
    const viewerIndex = validPosts.findIndex(p => p.photo_url === clickedUrl);
    currentProfilePhotos = validPosts;
    currentPhotoIndex = Math.max(0, viewerIndex);
    _renderViewer();
    document.getElementById('photo-viewer').classList.add('open');
  }

  async function _loadPhotos(userId) {
    const container = document.getElementById('ps-photos');
    const empty     = document.getElementById('ps-no-photos');
    try {
      const { data: photos } = await sb
        .from('instant_photos').select('id, photo_url, created_at')
        .eq('user_id', userId).order('created_at', { ascending: false });

      if (!photos || !photos.length) {
        container.innerHTML = '';
        empty.style.display = 'block';
        currentProfilePhotos = [];
        return;
      }

      // Likes
      const ids = photos.map(p => p.id);
      const { data: likesData } = await sb
        .from('photo_likes').select('photo_id, user_id').in('photo_id', ids);
      const counts = {}; const userLiked = new Set();
      (likesData || []).forEach(l => {
        counts[l.photo_id] = (counts[l.photo_id] || 0) + 1;
        if (l.user_id === myUserId) userLiked.add(l.photo_id);
      });

      currentProfilePhotos = photos.map(p => ({
        ...p, likesCount: counts[p.id] || 0, userLiked: userLiked.has(p.id)
      }));

      container.innerHTML = currentProfilePhotos.map((p, i) => `
        <div class="ps-photo-thumb-wrap" onclick="openPhotoViewer(${i})">
          <img class="ps-photo-thumb" src="${p.photo_url}" alt="photo" loading="lazy">
          <div class="ps-photo-likes">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="${p.userLiked ? '#c82828' : '#fff'}" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            ${p.likesCount}
          </div>
        </div>`).join('');
    } catch(e) {
      container.innerHTML = '<div style="padding:0 20px;color:var(--muted);font-size:12px;">Erreur.</div>';
    }
  }

  function openPhotoViewer(index) {
    currentPhotoIndex = index;
    _renderViewer();
    document.getElementById('photo-viewer').classList.add('open');
  }

  function closePhotoViewer() {
    document.getElementById('photo-viewer').classList.remove('open');
  }

  function _renderViewer() {
    const photo = currentProfilePhotos[currentPhotoIndex];
    if (!photo) return;
    document.getElementById('pv-img').src = photo.photo_url;

    const likeBtn = document.getElementById('pv-like-btn');
    likeBtn.classList.toggle('liked', photo.userLiked);
    document.getElementById('pv-like-count').textContent = photo.likesCount;

    // Dots
    document.getElementById('pv-dots').innerHTML = currentProfilePhotos
      .map((_, i) => `<div class="pv-dot${i === currentPhotoIndex ? ' active' : ''}"></div>`).join('');

    // User info in topbar
    const user = allUsersRef.find(u => u.id === currentProfileUserId);
    if (user) {
      const av = document.getElementById('pv-avatar');
      av.textContent = '';
      av.style.backgroundImage = user.avatar_url ? `url('${user.avatar_url}')` : 'none';
      if (!user.avatar_url) av.textContent = user.prenom[0];
      document.getElementById('pv-name').textContent = user.prenom;
    }
  }

  function photoPrev() {
    if (currentPhotoIndex > 0) { currentPhotoIndex--; _renderViewer(); }
  }

  function photoNext() {
    if (currentPhotoIndex < currentProfilePhotos.length - 1) {
      currentPhotoIndex++; _renderViewer();
    } else {
      closePhotoViewer();
    }
  }

  async function toggleLike() {
    const photo = currentProfilePhotos[currentPhotoIndex];
    if (!photo || !myUserId) return;
    const wasLiked = photo.userLiked;
    // Optimistic
    photo.userLiked = !wasLiked;
    photo.likesCount += wasLiked ? -1 : 1;
    _renderViewer();
    // Update thumbnail
    const thumbLike = document.querySelectorAll('.ps-photo-thumb-wrap')[currentPhotoIndex]?.querySelector('.ps-photo-likes');
    if (thumbLike) thumbLike.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="${photo.userLiked ? '#c82828' : '#fff'}" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${photo.likesCount}`;
    try {
      if (wasLiked) {
        await sb.from('photo_likes').delete().eq('photo_id', photo.id).eq('user_id', myUserId);
      } else {
        await sb.from('photo_likes').insert({ photo_id: photo.id, user_id: myUserId });
      }
    } catch(e) {
      // Revert
      photo.userLiked = wasLiked; photo.likesCount += wasLiked ? 1 : -1;
      _renderViewer();
    }
  }

  let _followInProgress = false; // anti double-clic

  async function toggleFollow() {
    if (!currentProfileUserId || !myUserId || currentProfileUserId === myUserId) return;
    if (_followInProgress) return;
    _followInProgress = true;

    const btn = document.getElementById('ps-follow-btn');
    const targetId = currentProfileUserId; // snapshot — ne change pas si l'user ouvre un autre profil
    const wasFollowing = followingSet.has(targetId);

    // ── Optimiste ─────────────────────────────────────────
    wasFollowing ? followingSet.delete(targetId) : followingSet.add(targetId);
    _refreshFollowBtn(btn, !wasFollowing);

    try {
      if (wasFollowing) {
        const { error } = await sb.from('friendships').delete()
          .eq('follower_id', myUserId).eq('following_id', targetId);
        if (error) throw error;
      } else {
        // upsert → pas d'erreur si déjà suivi (contrainte UNIQUE)
        const { error } = await sb.from('friendships')
          .upsert({ follower_id: myUserId, following_id: targetId },
                   { onConflict: 'follower_id,following_id', ignoreDuplicates: true });
        if (error) throw error;
      }
      // Rafraîchir l'onglet Friends
      const followedUsers = allUsersRef.filter(u => followingSet.has(u.id));
      renderFriendsGrid(followedUsers);
    } catch(e) {
      // Revert + message d'erreur visible
      wasFollowing ? followingSet.add(targetId) : followingSet.delete(targetId);
      _refreshFollowBtn(btn, wasFollowing);
      const msg = e?.message || '';
      if (msg.includes('does not exist') || msg.includes('relation')) {
        _showToast('Lance d\'abord le SQL pour créer la table friendships !', 'error');
      } else {
        _showToast('Erreur : ' + msg, 'error');
      }
      console.error('Follow error:', e);
    } finally {
      _followInProgress = false;
    }
  }

  function _refreshFollowBtn(btn, isFollowing) {
    if (!btn) return;
    btn.innerHTML = isFollowing
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Suivi'
      : '+ Suivre';
    btn.classList.toggle('following', isFollowing);
  }

  // Toast léger pour classement (sans dépendance externe)
  function _showToast(msg, type) {
    let t = document.getElementById('_cl-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = '_cl-toast';
      t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);' +
        'background:#1a1a1a;border:1px solid #333;color:#fff;padding:12px 20px;border-radius:99px;' +
        'font-size:13px;z-index:999;white-space:nowrap;transition:opacity 0.3s;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.borderColor = type === 'error' ? '#c82828' : '#2ecc71';
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
  }

  function switchMainTab(tab) {
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.rank-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.main-tab[onclick*="${tab}"]`).classList.add('active');
    document.getElementById('rank-panel-' + tab).classList.add('active');
  }

  function filterFriends(query) {
    const q = query.toLowerCase();
    document.querySelectorAll('#friends-grid .friend-card-new').forEach(c => {
      const name = c.querySelector('.friend-name-new')?.textContent.toLowerCase() || '';
      c.style.display = name.includes(q) ? '' : 'none';
    });
  }

  init();
</script>

    document.getElementById('upgrade-modal').classList.add('open');
